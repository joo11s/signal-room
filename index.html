<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL ROOM</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f1a;
  --bg3: #13131f;
  --border: #1e1e2e;
  --text: #e2e2ff;
  --text-dim: #666680;
  --glow: #3b82f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanline overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Header ── */
header {
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 14px;
  color: #10b981;
  text-shadow: 0 0 12px #10b981, 0 0 24px #10b981;
  letter-spacing: 3px;
}

.logo span {
  color: #3b82f6;
  text-shadow: 0 0 12px #3b82f6, 0 0 24px #3b82f6;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 8px #10b981;
  animation: pulse 2s infinite;
}

.time-display {
  font-size: 8px;
  color: var(--text-dim);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Main container ── */
main {
  padding: 32px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── Section title ── */
.section-title {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 4px;
  margin-bottom: 24px;
  border-left: 3px solid #10b981;
  padding-left: 12px;
}

/* ── Agent grid ── */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

@media (max-width: 1100px) {
  .agent-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  .agent-grid { grid-template-columns: 1fr; }
}

/* ── Agent card ── */
.agent-card {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
  overflow: hidden;
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-color, #3b82f6);
  opacity: 0.7;
}

.agent-card:hover {
  border-color: var(--card-color, #3b82f6);
  box-shadow: 0 0 20px -5px var(--card-color, #3b82f6);
}

/* status-based border */
.agent-card.status-running {
  border-color: #10b981;
  box-shadow: 0 0 16px -4px #10b981;
  animation: card-run 2s ease-in-out infinite;
}

.agent-card.status-error {
  border-color: #ef4444;
  box-shadow: 0 0 16px -4px #ef4444;
}

.agent-card.status-done {
  border-color: #3b82f6;
  box-shadow: 0 0 12px -4px #3b82f6;
}

@keyframes card-run {
  0%, 100% { box-shadow: 0 0 16px -4px #10b981; }
  50% { box-shadow: 0 0 30px -2px #10b981; }
}

/* ── Card header ── */
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.agent-badge {
  padding: 4px 8px;
  border-radius: 2px;
  font-size: 7px;
  background: var(--badge-bg, #1d4ed8);
  color: white;
  letter-spacing: 1px;
  white-space: nowrap;
}

.agent-id {
  font-size: 6px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* ── Pixel scene ── */
.pixel-scene {
  width: 100%;
  height: 120px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  margin-bottom: 16px;
  position: relative;
}

.pixel-scene svg {
  width: 200px;
  height: 120px;
  image-rendering: pixelated;
}

/* ── Monitor glow animations ── */
.monitor-screen {
  transition: fill 0.5s;
}

.status-running .monitor-screen { animation: screen-flicker 1s ease-in-out infinite; }
.status-error .monitor-screen { fill: #7f1d1d !important; }
.status-done .monitor-screen { fill: #1e3a5f !important; }

@keyframes screen-flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.8; }
}

/* ── Character animations ── */
.char-body { transition: transform 0.5s; transform-origin: bottom center; }

/* IDLE: gentle breathing float */
.status-idle .char-body { animation: idle-breathe 3s ease-in-out infinite; }
@keyframes idle-breathe {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

/* RUNNING: keyboard typing arm motion (alternating) */
.status-running .char-hand-l { animation: type-key 0.22s ease-in-out infinite; }
.status-running .char-hand-r { animation: type-key 0.22s ease-in-out infinite 0.11s; }
@keyframes type-key {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* DONE: celebration arm raise */
.status-done .char-hand-l, .status-done .char-hand-r { animation: raise-hands 0.5s ease forwards; }
@keyframes raise-hands {
  to { transform: translateY(-20px); }
}

/* ERROR: head shake */
.status-error .char-head { animation: head-shake 0.4s ease infinite; }
@keyframes head-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

/* typing cursor blink */
.typing-cursor {
  animation: blink 0.7s step-end infinite;
  display: none;
}
.status-running .typing-cursor { display: block; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── Card status bar ── */
.card-status {
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.agent-name {
  font-size: 8px;
  color: var(--card-color, #3b82f6);
}

.status-badge {
  font-size: 6px;
  padding: 3px 6px;
  border-radius: 2px;
  letter-spacing: 1px;
}

.status-idle    { background: #1a1a2e; color: #666680; }
.status-running-badge { background: #064e3b; color: #10b981; animation: badge-pulse 1s infinite; }
.status-done-badge    { background: #1e3a5f; color: #3b82f6; }
.status-error-badge   { background: #450a0a; color: #ef4444; }

@keyframes badge-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.agent-message {
  font-size: 6px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-height: 10px;
}

/* ── Footer ── */
footer {
  text-align: center;
  padding: 24px;
  font-size: 6px;
  color: #333355;
  border-top: 1px solid var(--border);
  letter-spacing: 2px;
}

/* ── Last updated bar ── */
.update-bar {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 8px 16px;
  font-size: 6px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.update-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 6px #10b981;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
</style>
</head>
<body>

<header>
  <div class="logo">SIGNAL<span> ROOM</span></div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="time-display" id="clock">--:--:--</div>
  </div>
</header>

<main>
  <div class="update-bar">
    <span><span class="update-dot"></span>LIVE SYNC · 30s INTERVAL</span>
    <span id="last-updated">SYNCING...</span>
  </div>

  <div class="section-title">AGENT STATIONS</div>

  <div class="agent-grid" id="agent-grid">
    <!-- Cards injected by JS -->
  </div>
</main>

<footer>SIGNAL ROOM v1.0 · SALES AUTOMATION HQ · ALL SYSTEMS OPERATIONAL</footer>

<script>
// ────────────────────────────────────────────────
// Agent config
// ────────────────────────────────────────────────
const AGENTS = [
  {
    id: 'research-agent',
    name: 'INTEL',
    label: 'research-agent',
    color: '#3b82f6',
    badgeBg: '#1d4ed8',
    desc: 'MARKET INTELLIGENCE',
    svgFn: buildIntelSVG,
  },
  {
    id: 'strategy-agent',
    name: 'STRATEGY',
    label: 'strategy-agent',
    color: '#10b981',
    badgeBg: '#065f46',
    desc: 'SALES STRATEGY',
    svgFn: buildStrategySVG,
  },
  {
    id: 'plan-agent',
    name: 'PLANNER',
    label: 'plan-agent',
    color: '#f59e0b',
    badgeBg: '#92400e',
    desc: 'EXECUTION PLANNING',
    svgFn: buildPlannerSVG,
  },
  {
    id: 'margin-agent',
    name: 'PROFIT',
    label: 'margin-agent',
    color: '#ea580c',
    badgeBg: '#7c2d12',
    desc: 'MARGIN ANALYSIS',
    svgFn: buildProfitSVG,
  },
  {
    id: 'blog-agent',
    name: 'WRITER',
    label: 'blog-agent',
    color: '#9333ea',
    badgeBg: '#581c87',
    desc: 'CONTENT CREATION',
    svgFn: buildWriterSVG,
  },
  {
    id: 'qa-agent',
    name: 'QA',
    label: 'qa-agent',
    color: '#e11d48',
    badgeBg: '#881337',
    desc: 'QUALITY ASSURANCE',
    svgFn: buildQASVG,
  },
];

// ────────────────────────────────────────────────
// SVG Pixel Scene Builders
// Each produces a 200x120 pixel-art scene:
// desk + monitor (right-offset) + character (left)
// ────────────────────────────────────────────────

// Common desk/monitor structure
function deskMonitor(screenColor, screenContent, propSvg) {
  return `
  <!-- Desk surface -->
  <rect x="10" y="88" width="180" height="8" fill="#5c3a1e" rx="1"/>
  <rect x="10" y="96" width="180" height="4" fill="#3e2510" rx="1"/>
  <!-- Desk legs -->
  <rect x="20" y="100" width="6" height="18" fill="#3e2510"/>
  <rect x="174" y="100" width="6" height="18" fill="#3e2510"/>
  <!-- Monitor stand -->
  <rect x="122" y="78" width="16" height="12" fill="#333344"/>
  <rect x="116" y="75" width="28" height="4" fill="#222233"/>
  <!-- Monitor body -->
  <rect x="98" y="28" width="76" height="50" fill="#1a1a2a" rx="2"/>
  <rect x="100" y="30" width="72" height="46" fill="#111120" rx="1"/>
  <!-- Screen -->
  <rect class="monitor-screen" x="103" y="33" width="66" height="40" fill="${screenColor}" rx="1"/>
  ${screenContent}
  <!-- Prop -->
  ${propSvg}
  `;
}

// Keyboard
function keyboard() {
  return `
  <rect x="30" y="85" width="60" height="6" fill="#1e1e30" rx="1"/>
  <rect x="32" y="86" width="4" height="2" fill="#333355"/>
  <rect x="38" y="86" width="4" height="2" fill="#333355"/>
  <rect x="44" y="86" width="4" height="2" fill="#333355"/>
  <rect x="50" y="86" width="4" height="2" fill="#333355"/>
  <rect x="56" y="86" width="4" height="2" fill="#333355"/>
  <rect x="62" y="86" width="4" height="2" fill="#333355"/>
  <rect x="68" y="86" width="4" height="2" fill="#333355"/>
  <rect x="74" y="86" width="4" height="2" fill="#333355"/>
  <rect x="34" y="89" width="16" height="2" fill="#333355"/>
  <rect x="52" y="89" width="12" height="2" fill="#333355"/>
  <rect x="66" y="89" width="16" height="2" fill="#333355"/>
  `;
}

// Seated pixel character (1.5× scale, sitting at desk leaning toward keyboard)
// cx = horizontal center of character
function charSitting(cx, color, headExtra) {
  const hx = cx - 9;   // head x start (18px wide, centered at cx)
  const bx = cx - 8;   // body x start (16px wide)
  const lax = cx - 13; // left arm x
  const rax = cx + 8;  // right arm x
  return `
  <g class="char-body">
    <!-- Chair back -->
    <rect x="${cx-2}" y="48" width="4" height="26" fill="#111120" rx="1"/>
    <!-- Chair seat (mostly hidden behind desk) -->
    <rect x="${cx-13}" y="72" width="28" height="5" fill="#0d0d1e" rx="1"/>
    <!-- Head (18×18, larger) -->
    <rect class="char-head" x="${hx}" y="28" width="18" height="18" fill="${color}" rx="1"/>
    <!-- Left eye -->
    <rect x="${hx+3}" y="33" width="3" height="3" fill="#111"/>
    <!-- Right eye -->
    <rect x="${hx+11}" y="33" width="3" height="3" fill="#111"/>
    <!-- Mouth -->
    <rect x="${hx+4}" y="41" width="10" height="2" fill="#111"/>
    ${headExtra}
    <!-- Body (16×26) seated, leaning toward keyboard -->
    <rect x="${bx}" y="46" width="16" height="26" fill="${color}"/>
    <!-- Left arm reaching toward keyboard -->
    <rect class="char-hand-l" x="${lax}" y="52" width="5" height="26" fill="${color}"/>
    <!-- Right arm reaching toward keyboard -->
    <rect class="char-hand-r" x="${rax}" y="52" width="5" height="26" fill="${color}"/>
  </g>
  `;
}

// ── INTEL: antenna analyst, blue ──
function buildIntelSVG(status) {
  const sc = status === 'running' ? '#064e3b' : status === 'error' ? '#4a0404' : status === 'done' ? '#0c2340' : '#0a0a18';
  const screenContent = `
    <!-- Line graph -->
    <polyline points="107,68 115,58 123,62 131,50 139,55 147,42 155,46 163,38" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <rect x="107" y="38" width="1" height="32" fill="#333" opacity="0.5"/>
    <rect x="107" y="69" width="56" height="1" fill="#333" opacity="0.5"/>
    ${status==='running'?`<rect class="typing-cursor" x="160" y="38" width="2" height="6" fill="#10b981"/>`:''}
  `;
  // Telescope prop on right of desk
  const prop = `
    <rect x="168" y="78" width="14" height="5" fill="#444" transform="rotate(-20, 175, 80)"/>
    <rect x="163" y="75" width="6" height="4" fill="#666" transform="rotate(-20, 166, 77)"/>
  `;
  // Head extra: antenna (above head top y=28)
  const headExtra = `
    <rect x="42" y="14" width="3" height="16" fill="#3b82f6"/>
    <circle cx="43" cy="13" r="3" fill="#93c5fd"/>
  `;
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    ${deskMonitor(sc, screenContent, prop)}
    ${keyboard()}
    ${charSitting(42, '#3b82f6', headExtra)}
  </svg>`;
}

// ── STRATEGY: sunglasses strategist, green ──
function buildStrategySVG(status) {
  const sc = status === 'running' ? '#064e3b' : status === 'error' ? '#4a0404' : status === 'done' ? '#0c2340' : '#0a0a18';
  const screenContent = `
    <!-- Rising trend chart -->
    <polyline points="107,70 120,65 133,55 146,48 159,38" fill="none" stroke="#10b981" stroke-width="2" opacity="0.9"/>
    <polygon points="107,70 120,65 133,55 146,48 159,38 163,70" fill="#10b981" opacity="0.15"/>
    ${status==='running'?`<rect class="typing-cursor" x="158" y="38" width="2" height="6" fill="#10b981"/>`:''}
  `;
  const prop = `
    <!-- Compass -->
    <circle cx="175" cy="81" r="6" fill="none" stroke="#555" stroke-width="1.5"/>
    <line x1="175" y1="75" x2="175" y2="78" stroke="#e11d48" stroke-width="1.5"/>
    <line x1="175" y1="84" x2="175" y2="87" stroke="#888" stroke-width="1.5"/>
    <line x1="169" y1="81" x2="172" y2="81" stroke="#888" stroke-width="1.5"/>
    <line x1="178" y1="81" x2="181" y2="81" stroke="#888" stroke-width="1.5"/>
  `;
  // Sunglasses (over eyes at hx+3=36 and hx+11=44, y=33)
  const headExtra = `
    <rect x="34" y="32" width="8" height="5" fill="#111" rx="1"/>
    <rect x="44" y="32" width="8" height="5" fill="#111" rx="1"/>
    <rect x="42" y="34" width="2" height="2" fill="#333"/>
    <rect x="31" y="34" width="3" height="2" fill="#333"/>
    <rect x="52" y="34" width="3" height="2" fill="#333"/>
  `;
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    ${deskMonitor(sc, screenContent, prop)}
    ${keyboard()}
    ${charSitting(42, '#10b981', headExtra)}
  </svg>`;
}

// ── PLANNER: hat planner, yellow ──
function buildPlannerSVG(status) {
  const sc = status === 'running' ? '#064e3b' : status === 'error' ? '#4a0404' : status === 'done' ? '#0c2340' : '#0a0a18';
  const screenContent = `
    <!-- Calendar grid -->
    <rect x="106" y="34" width="60" height="38" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <rect x="106" y="34" width="60" height="6" fill="#f59e0b" opacity="0.3"/>
    <line x1="121" y1="34" x2="121" y2="72" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <line x1="136" y1="34" x2="136" y2="72" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <line x1="151" y1="34" x2="151" y2="72" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <line x1="106" y1="48" x2="166" y2="48" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <line x1="106" y1="58" x2="166" y2="58" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <line x1="106" y1="68" x2="166" y2="68" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <rect x="122" y="49" width="13" height="9" fill="#f59e0b" opacity="0.3"/>
    ${status==='running'?`<rect class="typing-cursor" x="160" y="60" width="2" height="6" fill="#f59e0b"/>`:''}
  `;
  // Alarm clock
  const prop = `
    <circle cx="174" cy="80" r="7" fill="none" stroke="#888" stroke-width="1.5"/>
    <circle cx="174" cy="80" r="5" fill="#1a1a2a"/>
    <line x1="174" y1="80" x2="174" y2="76" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="174" y1="80" x2="177" y2="80" stroke="#888" stroke-width="1"/>
    <circle cx="171" cy="74" r="2" fill="none" stroke="#888" stroke-width="1"/>
    <circle cx="177" cy="74" r="2" fill="none" stroke="#888" stroke-width="1"/>
  `;
  // Hat (above head top y=28, head width x=33-51)
  const headExtra = `
    <rect x="30" y="26" width="24" height="4" fill="#f59e0b"/>
    <rect x="33" y="16" width="18" height="12" fill="#d97706"/>
  `;
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    ${deskMonitor(sc, screenContent, prop)}
    ${keyboard()}
    ${charSitting(42, '#d97706', headExtra)}
  </svg>`;
}

// ── PROFIT: tie analyst, orange ──
function buildProfitSVG(status) {
  const sc = status === 'running' ? '#064e3b' : status === 'error' ? '#4a0404' : status === 'done' ? '#0c2340' : '#0a0a18';
  const screenContent = `
    <!-- Numbers/formula -->
    <text x="108" y="44" font-family="monospace" font-size="6" fill="#ea580c" opacity="0.9">$2,450</text>
    <text x="108" y="53" font-family="monospace" font-size="6" fill="#888">× 1.35</text>
    <line x1="107" y1="56" x2="160" y2="56" stroke="#ea580c" stroke-width="0.8" opacity="0.5"/>
    <text x="108" y="65" font-family="monospace" font-size="6" fill="#10b981" opacity="0.9">$3,307</text>
    <text x="108" y="70" font-family="monospace" font-size="5" fill="#ea580c" opacity="0.7">+35.0%</text>
    ${status==='running'?`<rect class="typing-cursor" x="155" y="70" width="2" height="5" fill="#ea580c"/>`:''}
  `;
  // Coin stack
  const prop = `
    <ellipse cx="174" cy="88" rx="7" ry="2" fill="#f59e0b" opacity="0.8"/>
    <rect x="167" y="83" width="14" height="5" fill="#d97706"/>
    <ellipse cx="174" cy="83" rx="7" ry="2" fill="#f59e0b" opacity="0.8"/>
    <rect x="167" y="78" width="14" height="5" fill="#d97706"/>
    <ellipse cx="174" cy="78" rx="7" ry="2" fill="#f59e0b" opacity="0.8"/>
  `;
  // Necktie (on body, bx=34, y=46, centered at cx=42)
  const headExtra = `
    <rect x="39" y="46" width="6" height="12" fill="#ea580c"/>
    <polygon points="37,58 47,58 44,70" fill="#ea580c"/>
  `;
  return `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    ${deskMonitor(sc, screenContent, prop)}

// ────────────────────────────────────────────────
// Card render
// ────────────────────────────────────────────────
function getStatusBadgeClass(status) {
  switch (status) {
    case 'running': return 'status-running-badge';
    case 'done':    return 'status-done-badge';
    case 'error':   return 'status-error-badge';
    default:        return 'status-idle';
  }
}

function getCardStatusClass(status) {
  switch (status) {
    case 'running': return 'status-running';
    case 'done':    return 'status-done';
    case 'error':   return 'status-error';
    default:        return 'status-idle';
  }
}

function renderCards(stateMap) {
  const grid = document.getElementById('agent-grid');
  grid.innerHTML = '';
  AGENTS.forEach(agent => {
    const agentState = stateMap[agent.id] || { status: 'idle', message: '' };
    const status = (agentState.status || 'idle').toLowerCase();
    const message = agentState.message || '대기 중...';
    const svgHtml = agent.svgFn(status);

    const card = document.createElement('div');
    card.className = `agent-card ${getCardStatusClass(status)}`;
    card.style.setProperty('--card-color', agent.color);
    card.style.setProperty('--badge-bg', agent.badgeBg);
    card.innerHTML = `
      <div class="card-header">
        <div class="agent-badge" style="background:${agent.badgeBg}">${agent.name}</div>
        <div class="agent-id">${agent.desc}</div>
      </div>
      <div class="pixel-scene">${svgHtml}</div>
      <div class="card-status">
        <div class="status-row">
          <div class="agent-name">${agent.label}</div>
          <div class="status-badge ${getStatusBadgeClass(status)}">${status.toUpperCase()}</div>
        </div>
        <div class="agent-message">${message}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ────────────────────────────────────────────────
// Google Sheets polling
// ────────────────────────────────────────────────
const SHEET_ID = '1a8q2J6LXrzSf8BozovoABnGZ6brLEQPQvV5JCTPm3QI';
const SHEET_NAME = 'signal_room_progress';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

async function fetchSheetData() {
  try {
    const res = await fetch(SHEET_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // Strip JSONP wrapper: google.visualization.Query.setResponse(...)
    const json = JSON.parse(text.replace(/^.*?\(/, '').replace(/\);?\s*$/, ''));
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label.toLowerCase());
    const idxAgent   = cols.indexOf('agent');
    const idxStatus  = cols.indexOf('status');
    const idxMessage = cols.indexOf('message');

    const map = {};
    rows.forEach(row => {
      const c = row.c;
      const agent   = c[idxAgent]   && c[idxAgent].v   ? String(c[idxAgent].v)   : null;
      const status  = c[idxStatus]  && c[idxStatus].v  ? String(c[idxStatus].v)  : 'idle';
      const message = c[idxMessage] && c[idxMessage].v ? String(c[idxMessage].v) : '';
      if (agent) map[agent] = { status, message };
    });
    return map;
  } catch (e) {
    console.warn('Sheet fetch failed:', e.message);
    return null;
  }
}

async function syncAgents() {
  const data = await fetchSheetData();
  const stateMap = data || {};
  renderCards(stateMap);
  const now = new Date().toLocaleTimeString('ko-KR');
  document.getElementById('last-updated').textContent = `LAST SYNC: ${now}`;
}

}

// ────────────────────────────────────────────────
syncAgents();
setInterval(syncAgents, 30000);
updateClock();
setInterval(updateClock, 1000);
